services:
  bot:
    build: .
    container_name: telegram-bot
    env_file:
      - .env
    restart: unless-stopped
    network_mode: "bridge"
    dns:
      - 1.1.1.1
      - 8.8.8.8

    environment:
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx, os; token=os.getenv('TOKEN'); exit(0 if httpx.get(f'https://api.telegram.org/bot{token}/getMe', timeout=10).status_code == 200 else 1)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
